<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Drug Recommendation System</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
    nav{display:flex;justify-content:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    nav a{padding:8px 18px;background:rgba(255,255,255,0.2);color:white;border-radius:20px;text-decoration:none;font-size:.9rem;font-weight:600;transition:.3s}
    nav a:hover,nav a.active{background:white;color:#764ba2}
    .box{max-width:560px;margin:0 auto;background:white;border-radius:16px;padding:35px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    h1{text-align:center;color:#764ba2;font-size:1.7rem;margin-bottom:6px}
    p.sub{text-align:center;color:#888;margin-bottom:24px;font-size:.9rem}
    .row{display:flex;gap:14px}
    .fg{margin-bottom:16px;flex:1}
    label{display:block;font-weight:600;color:#444;margin-bottom:6px;font-size:.9rem}
    input,select{width:100%;padding:11px 14px;border:2px solid #ddd;border-radius:8px;font-size:1rem;transition:.3s}
    input:focus,select:focus{outline:none;border-color:#667eea}
    .sec{font-size:.78rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:1px;margin:16px 0 10px;border-bottom:1px solid #eee;padding-bottom:6px}
    .badge{display:inline-block;background:#f0f4ff;color:#667eea;border-radius:6px;padding:2px 10px;font-size:.76rem;font-weight:600;margin-top:4px}
    button{width:100%;padding:14px;margin-top:8px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:10px;font-size:1.05rem;font-weight:600;cursor:pointer;transition:.3s}
    button:hover{opacity:.9;transform:translateY(-1px)}
    .warn{margin-top:14px;padding:10px;background:#fff8e1;border-radius:8px;font-size:.8rem;color:#777;text-align:center}
  </style>
</head>
<body>
  <nav>
    <a href="/" class="active">🏠 Home</a>
    <a href="/dashboard">📊 Dashboard</a>
    <a href="/history">🕐 History</a>
    <a href="/about">ℹ️ About</a>
  </nav>
  <div class="box">
    <h1>🏥 AI Drug Recommendation</h1>
    <p class="sub">Enter patient details for an AI-powered drug prediction</p>
    <form action="/predict" method="POST">
      <div class="sec">Patient Information</div>
      <div class="row">
        <div class="fg">
          <label>Age</label>
          <input type="number" name="age" placeholder="Enter age" min="1" max="120" required/>
        </div>
        <div class="fg">
          <label>Gender</label>
          <select name="gender" required>
            <option value="" disabled selected>-- Select --</option>
            <option>Female</option><option>Male</option>
          </select>
        </div>
      </div>
      <div class="sec">Clinical Details</div>
      <div class="fg">
        <label>Medical Condition</label>
        <select name="condition" required>
          <option value="" disabled selected>-- Select Condition --</option>
          <option>Diabetes</option><option>Depression</option>
          <option>Hypertension</option><option>Infection</option>
          <option>Pain Relief</option>
        </select>
      </div>
      <div class="row">
        <div class="fg">
          <label>Blood Pressure <span class="badge">Optional</span></label>
          <select name="blood_pressure">
            <option>Normal</option><option>Low</option><option>High</option>
          </select>
        </div>
        <div class="fg">
          <label>Severity <span class="badge">Optional</span></label>
          <select name="severity">
            <option>Mild</option><option selected>Moderate</option><option>Severe</option>
          </select>
        </div>
      </div>
      <button type="submit">🔍 Get Drug Recommendation</button>
    </form>
    <div class="warn">⚠️ For academic/educational purposes only. Not for real medical use.</div>
  </div>
</body>
</html>
